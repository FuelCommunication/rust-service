services:
  database:
    container_name: channels-db
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: fuel_channels
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - channels-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    container_name: channels-valkey
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    container_name: channels-meilisearch
    image: getmeili/meilisearch:v1.14
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  channels-data:
  valkey-data:
  meili-data:
