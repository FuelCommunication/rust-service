syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthTokens);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  rpc OAuthGetAuthUrl(OAuthGetAuthUrlRequest) returns (OAuthGetAuthUrlResponse);
  rpc OAuthAuthenticate(OAuthAuthenticateRequest) returns (AuthTokens);
}

enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_GOOGLE = 1;
  OAUTH_PROVIDER_GITHUB = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string username = 3;
}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  AuthTokens tokens = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  AuthTokens tokens = 4;
}

message AuthTokens {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message LogoutRequest {
  string refresh_token = 1;
}

message OAuthGetAuthUrlRequest {
  OAuthProvider provider = 1;
  string redirect_uri = 2;
}

message OAuthGetAuthUrlResponse {
  string authorize_url = 1;
}

message OAuthAuthenticateRequest {
  OAuthProvider provider = 1;
  string code = 2;
  string redirect_uri = 3;
}
